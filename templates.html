<!DOCTYPE html>
<html>
<head>
    <title>AI Mess Optimizer</title>
    <style>
        body {
            font-family: Arial;
            margin: 40px;
            background-color: #f5f5f5;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 600px;
            margin: auto;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }
        button {
            padding: 10px 15px;
            background: #2c7;
            border: none;
            color: white;
            cursor: pointer;
        }
        h2 { text-align: center; }
    </style>
</head>

<body>

<div class="container">
    <h2>🍛 AI Smart Mess Optimizer</h2>

    <!-- ML Prediction -->
    <form action="/predict" method="post">
        <h3>Predict Meals Demand</h3>
        <input type="text" name="attendance" placeholder="Enter Attendance %" required>
        <button type="submit">Predict</button>
    </form>

    {% if prediction_text %}
    <h4>{{ prediction_text }}</h4>
    {% endif %}

    <hr>

    <!-- AI Analysis -->
    <form action="/analyze" method="post">
        <h3>AI Mess Analysis</h3>

        <textarea name="attendance_data" placeholder="Enter attendance data"></textarea>
        <textarea name="food_data" placeholder="Enter food consumption data"></textarea>

        <button type="submit">Generate AI Report</button>
    </form>

    {% if ai_output %}
    <h4>AI Output:</h4>
    <pre>{{ ai_output }}</pre>
    {% endif %}
</div>

</body>
</html>
